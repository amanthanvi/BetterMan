name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency_review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Dependency review
        uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803 # v4
        with:
          fail-on-severity: high

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10.27.0

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v4
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -C frontend lint
      - run: pnpm -C frontend test
      - run: pnpm -C frontend build
      - run: pnpm -C frontend bundle:report

  nextjs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10.27.0

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v4
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -C nextjs lint
      - run: pnpm -C nextjs build

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: 3.14

      - run: pipx install uv
      - run: cd backend && uv sync --frozen
      - run: cd backend && uv run ruff check .
      - run: cd backend && uv run ruff format --check .
      - run: cd backend && uv run pytest

  ingestion:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: 3.14

      - run: pipx install uv
      - run: cd ingestion && uv sync --frozen
      - run: cd ingestion && uv run ruff check .
      - run: cd ingestion && uv run ruff format --check .
      - run: cd ingestion && uv run python -m pytest

  api_types:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10.27.0

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v4
        with:
          node-version: 25
          cache: pnpm

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: 3.14

      - run: pnpm install --frozen-lockfile

      - run: pipx install uv
      - run: cd backend && uv sync --frozen

      - name: OpenAPI types are up to date
        run: |
          set -euo pipefail

          cd backend
          uv run python scripts/export_openapi.py /tmp/betterman-openapi.json

          cd ..
          pnpm -C frontend exec openapi-typescript /tmp/betterman-openapi.json --output src/api/openapi.gen.ts
          pnpm -C nextjs exec openapi-typescript /tmp/betterman-openapi.json --output lib/openapi.gen.ts

          git diff --exit-code frontend/src/api/openapi.gen.ts
          git diff --exit-code nextjs/lib/openapi.gen.ts

  e2e:
    needs:
      - frontend
      - nextjs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10.27.0

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v4
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm -C frontend exec playwright install --with-deps chromium

      - name: Provision local Convex + seed E2E data
        env:
          CONVEX_AGENT_MODE: anonymous
          BETTERMAN_E2E_SEED: "1"
          BETTERMAN_DATASET_STAGE: prod
          CONVEX_INGEST_SECRET: e2e-secret
        run: |
          set -euo pipefail

          npx convex dev --once
          npx convex env set CONVEX_INGEST_SECRET "$CONVEX_INGEST_SECRET"

          nohup npx convex dev --tail-logs disable > /tmp/betterman-convex.log 2>&1 &
          echo $! > /tmp/betterman-convex.pid

          for attempt in {1..60}; do
            if grep -q "Convex functions ready" /tmp/betterman-convex.log; then
              break
            fi
            sleep 1
          done

          if ! grep -q "Convex functions ready" /tmp/betterman-convex.log; then
            echo "Timed out waiting for Convex"
            tail -n 200 /tmp/betterman-convex.log || true
            exit 1
          fi

          set -a
          # shellcheck disable=SC1091
          . ./.env.local
          set +a

          CONVEX_HTTP_URL="$CONVEX_SITE_URL" node scripts/seed-convex-e2e.mjs

      - name: Start Next.js
        env:
          BETTERMAN_DATASET_STAGE: prod
        run: |
          set -euo pipefail

          set -a
          # shellcheck disable=SC1091
          . ./.env.local
          set +a

          export NEXT_PUBLIC_CONVEX_URL="$CONVEX_URL"
          export CONVEX_URL="$CONVEX_URL"
          export CONVEX_INGEST_SECRET="e2e-secret"

          pnpm -C nextjs build

          nohup pnpm -C nextjs exec next start -p 3000 > /tmp/betterman-next.log 2>&1 &

          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/robots.txt >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "Timed out waiting for Next.js"
          tail -n 200 /tmp/betterman-next.log || true
          exit 1

      - name: Run Playwright E2E + a11y
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
        run: pnpm -C frontend e2e

  deploy_railway:
    needs:
      - frontend
      - nextjs
      - backend
      - ingestion
      - api_types
      - e2e
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v4
        with:
          node-version: 25

      - name: Install Railway CLI
        shell: bash
        run: |
          set -euo pipefail

          export RAILWAY_VERSION="4.18.1"

          for attempt in 1 2 3; do
            echo "Installing @railway/cli@${RAILWAY_VERSION} (attempt $attempt/3)…"
            if npm install -g "@railway/cli@${RAILWAY_VERSION}"; then
              break
            fi
            sleep $((attempt * 10))
          done

          railway --version

      - name: Deploy web (Railway)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_WORKSPACE_ID: ed8a9f0d-ab1b-48a4-a7a1-86a95b0e5f18
          RAILWAY_PROJECT_ID: efecaef3-7389-4b3e-b767-5f56858b845e
          RAILWAY_ENVIRONMENT_ID: dc10158e-d1fd-4039-9089-4c6068357251
          RAILWAY_SERVICE_ID: d254e49e-352c-4678-8933-eab6422a02c1
          RAILWAY_NEXTJS_SERVICE_ID: 40fa322d-c334-4662-8858-8edf380d3f10
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${RAILWAY_TOKEN:-}" ]]; then
            echo "Missing RAILWAY_TOKEN GitHub Actions secret."
            exit 1
          fi

          railway_project_token() {
            env RAILWAY_TOKEN="$RAILWAY_TOKEN" railway "$@"
          }

          railway_bearer_token() {
            env -u RAILWAY_TOKEN RAILWAY_API_TOKEN="$RAILWAY_TOKEN" railway "$@"
          }

          railway_run() {
            local output
            local status

            set +e
            output="$(railway_project_token "$@" 2>&1)"
            status=$?
            set -e
            printf '%s\n' "$output"

            if [[ $status -eq 0 ]]; then
              return 0
            fi

            if ! grep -qi "Unauthorized" <<<"$output"; then
              return "$status"
            fi

            echo "Project-token auth rejected; retrying with bearer-token compatibility path..."
            railway_bearer_token "$@"
          }

          deploy_service() {
            local service_id="$1"

            if railway_run up --ci \
              --project "$RAILWAY_PROJECT_ID" \
              --service "$service_id" \
              --environment "$RAILWAY_ENVIRONMENT_ID"; then
              return 0
            fi

            railway_run logs --deployment --lines 200 --latest \
              --service "$service_id" \
              --environment "$RAILWAY_ENVIRONMENT_ID" || true
            return 1
          }

          deploy_service "$RAILWAY_SERVICE_ID"
          deploy_service "$RAILWAY_NEXTJS_SERVICE_ID"
