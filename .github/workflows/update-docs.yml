name: update-dataset

on:
  workflow_dispatch:
    inputs:
      ingest:
        description: Run ingestion into staging DB
        type: boolean
        required: false
        default: true
      linux:
        description: Run Linux container ingests (debian/ubuntu/fedora/arch/alpine)
        type: boolean
        required: false
        default: true
      bsd:
        description: Run BSD ingests (freebsd/macos)
        type: boolean
        required: false
        default: true
      linux_distro:
        description: Linux distro to ingest (workflow_dispatch only)
        type: choice
        required: false
        default: all
        options:
          - all
          - debian
          - ubuntu
          - fedora
          - arch
          - alpine
      promote:
        description: Promote active staging releases to prod
        type: boolean
        required: false
        default: false
  schedule:
    # Monthly on the 1st at 05:00 UTC
    - cron: "0 5 1 * *"

concurrency:
  group: update-dataset
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ingest_linux:
    if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.ingest != 'false' && github.event.inputs.linux != 'false') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: 3.14

      - run: pipx install uv
      - run: cd ingestion && uv sync --frozen

      - name: Ingest to Convex staging
        env:
          CONVEX_HTTP_URL: ${{ secrets.BETTERMAN_CONVEX_HTTP_URL }}
          CONVEX_INGEST_SECRET: ${{ secrets.BETTERMAN_CONVEX_INGEST_SECRET }}
          BETTERMAN_DATASET_STAGE: staging
          BETTERMAN_DEBIAN_IMAGE_REF: debian:trixie
          BETTERMAN_UBUNTU_IMAGE_REF: ubuntu:24.04
          BETTERMAN_FEDORA_IMAGE_REF: fedora:41
          BETTERMAN_ARCH_IMAGE_REF: archlinux:latest
          BETTERMAN_ALPINE_IMAGE_REF: alpine:3.20
        shell: bash
        run: |
          set -euo pipefail

          cd ingestion

          target="${{ github.event.inputs.linux_distro }}"
          if [[ -z "${target}" || "${target}" == "all" ]]; then
            echo "Ingesting Debian…"
            uv run python -m ingestion.cli ingest --distro debian --activate

            echo "Ingesting Arch…"
            uv run python -m ingestion.cli ingest --distro arch --activate

            echo "Ingesting Alpine…"
            uv run python -m ingestion.cli ingest --distro alpine --activate

            echo "Ingesting Ubuntu…"
            uv run python -m ingestion.cli ingest --distro ubuntu --activate || echo "Ubuntu ingest failed (continuing)"

            echo "Ingesting Fedora…"
            uv run python -m ingestion.cli ingest --distro fedora --activate || echo "Fedora ingest failed (continuing)"
          else
            echo "Ingesting ${target}…"
            uv run python -m ingestion.cli ingest --distro "${target}" --activate
          fi

  ingest_macos:
    if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.ingest != 'false' && github.event.inputs.bsd != 'false') }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: 3.14

      - run: pipx install uv
      - run: cd ingestion && uv sync --frozen

      - name: Ingest macOS (BSD) to Convex staging
        env:
          CONVEX_HTTP_URL: ${{ secrets.BETTERMAN_CONVEX_HTTP_URL }}
          CONVEX_INGEST_SECRET: ${{ secrets.BETTERMAN_CONVEX_INGEST_SECRET }}
          BETTERMAN_DATASET_STAGE: staging
        shell: bash
        run: |
          set -euo pipefail

          cd ingestion

          echo "Ingesting macOS (BSD)…"
          uv run python -m ingestion.cli ingest --distro macos --activate

  ingest_freebsd:
    if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.ingest != 'false' && github.event.inputs.bsd != 'false') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Ingest FreeBSD to Convex staging
        uses: vmactions/freebsd-vm@c9f815bc7aa0d34c9fdd0619b034a32d6ca7b57e # v1
        with:
          release: "15.0"
          envs: "CONVEX_HTTP_URL CONVEX_INGEST_SECRET BETTERMAN_DATASET_STAGE BETTERMAN_INGEST_GIT_SHA"
          usesh: true
          run: |
            set -euo pipefail

            cd "$GITHUB_WORKSPACE"

            pkg update -f
            pkg install -y python3

            py="python3"
            if ! $py -c 'import sys; raise SystemExit(0 if sys.version_info >= (3, 12) else 1)'; then
              echo "python3 is < 3.12; installing python312…"
              pkg install -y python312
              py="python3.12"
            fi

            if ! command -v cargo >/dev/null 2>&1; then
              echo "cargo not found; installing Rust toolchain (required to build pydantic-core)…"
              pkg install -y rust
            fi

            $py -m ensurepip --upgrade
            $py -m pip install --upgrade pip
            $py -m pip install ./ingestion

            echo "Ingesting FreeBSD…"
            $py -m ingestion.cli ingest --distro freebsd --activate
        env:
          CONVEX_HTTP_URL: ${{ secrets.BETTERMAN_CONVEX_HTTP_URL }}
          CONVEX_INGEST_SECRET: ${{ secrets.BETTERMAN_CONVEX_INGEST_SECRET }}
          BETTERMAN_DATASET_STAGE: staging
          BETTERMAN_INGEST_GIT_SHA: ${{ github.sha }}

  promote:
    runs-on: ubuntu-latest
    needs: [ingest_linux, ingest_macos, ingest_freebsd]
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.promote == 'true') }}
    steps:
      - name: Promote active Convex staging releases to prod
        env:
          CONVEX_HTTP_URL: ${{ secrets.BETTERMAN_CONVEX_HTTP_URL }}
          CONVEX_INGEST_SECRET: ${{ secrets.BETTERMAN_CONVEX_INGEST_SECRET }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CONVEX_HTTP_URL:-}" || -z "${CONVEX_INGEST_SECRET:-}" ]]; then
            echo "Missing BETTERMAN_CONVEX_HTTP_URL / BETTERMAN_CONVEX_INGEST_SECRET secrets."
            exit 1
          fi

          python - <<'PY' > promote.json
          import datetime
          import json

          print(json.dumps({
              "fromStage": "staging",
              "toStage": "prod",
              "distros": ["debian", "ubuntu", "fedora", "arch", "alpine", "freebsd", "macos"],
              "activatedAt": datetime.datetime.now(datetime.UTC).isoformat(),
          }))
          PY

          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${CONVEX_INGEST_SECRET}" \
            -H "Content-Type: application/json" \
            --data @promote.json \
            "${CONVEX_HTTP_URL%/}/ingest/promote"
